spring.application.name=placement
server.port=8081

# No generated default user (login is via /api/auth/login only)
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# JSON timezone (API level)
spring.jackson.time-zone=Asia/Kolkata

# Database
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.datasource.url=jdbc:postgresql://localhost:5432/placement_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# Hikari: READ COMMITTED matches PostgreSQL default; committed rows are visible to other
# connections (e.g. pgAdmin) as soon as the API transaction finishes—re-run your query there to see them.
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED
# Marks app connections in pgAdmin (Dashboard / Activity, or pg_stat_activity.application_name).
spring.datasource.hikari.connection-init-sql=SET application_name = 'placement-backend'

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Keep schema aligned with entities on startup so pgAdmin shows the same structure the app expects.
spring.jpa.properties.hibernate.hbm2ddl.jdbc_metadata_extraction_strategy=individually

# No Hibernate 2nd-level / query cache: every read hits the database as it is on disk.
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# ? Important
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT settings (replace secret before production use)
app.jwt.secret=3f4b9e7a2c6d1f8b5a0e3c9d7b2f1a6e4c8d0b2a7f9e1c3d6b5a8f0c2d4e7a1
app.jwt.expiry-ms=2592000000