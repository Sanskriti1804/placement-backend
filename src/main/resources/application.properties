spring.application.name=placement
server.port=8081

# No generated default user (login is via /api/auth/login only)
spring.autoconfigure.exclude=org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration

# JSON timezone (API level)
spring.jackson.time-zone=Asia/Kolkata

# Database
#spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
spring.datasource.url=jdbc:postgresql://localhost:5432/placement_db
spring.datasource.username=postgres
spring.datasource.password=postgres

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ? Important
spring.jpa.properties.hibernate.jdbc.time_zone=UTC